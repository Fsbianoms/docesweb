<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces Dashboard - CRM de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <style>
        .crm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .client-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .client-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 25px rgba(247, 37, 133, 0.2);
        }
        .client-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .client-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--grad-3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
        }
        .client-name {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .client-status {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .client-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .debt-alert {
            color: var(--warning);
        }
        .fav-product {
            background: rgba(255,255,255,0.03);
            padding: 0.8rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .fav-icon {
            color: var(--primary-color);
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .btn-icon {
            flex: 1;
            padding: 0.6rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.3s;
        }
        .btn-whatsapp { 
            background: rgba(13, 240, 163, 0.15); 
            color: var(--success); 
        }
        .btn-whatsapp:hover { background: rgba(13, 240, 163, 0.3); }
        .btn-details { 
            background: rgba(255,255,255,0.05); 
            color: white; 
        }
        .btn-details:hover { background: rgba(255,255,255,0.1); }
        
        .crm-top-metrics {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .crm-metric {
            flex: 1;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .crm-metric h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .crm-metric p {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--grad-1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .close-modal {
            position: absolute;
            right: 1.5rem;
            top: 1.5rem;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .history-prod {
            font-weight: 600;
        }
        .history-meta {
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-candy-cane logo-icon"></i>
                <h2>DocesWeb</h2>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="clientes.html" class="nav-item active"><i class="fa-solid fa-users"></i> Clientes (CRM)</a>
            </nav>
            
            <div style="margin-top: auto; padding-top: 1rem;">
                <label style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Link da Planilha Google:</label>
                <input type="text" id="sheetUrlInput" placeholder="Cole o link aqui..." style="width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; font-size: 0.8rem; margin-bottom: 0.5rem; outline: none;">
                <button id="syncBtn" class="nav-item" style="background: rgba(13, 240, 163, 0.1); border: 1px solid rgba(13, 240, 163, 0.2); color: var(--success); cursor: pointer; width: 100%; text-align: left; font-size: 0.9rem; font-family: inherit;">
                    <i class="fa-solid fa-sync"></i> Sincronizar Excel
                </button>
            </div>
            <div class="user-profile">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div>
                    <h4>Administrador</h4>
                    <p>admin@doces.com</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>CRM de Clientes</h1>
                    <p class="subtitle">Gestão de relacionamento, compras e pendências</p>
                </div>
                <div class="header-right" style="display: flex; gap: 1rem; align-items: center;">
                    <div class="month-filter">
                        <label for="monthSelect">Mês de Referência:</label>
                        <select id="monthSelect">
                            <option value="Todos">Todos os Meses</option>
                            <option value="Janeiro">Janeiro</option>
                            <option value="Fevereiro">Fevereiro</option>
                            <option value="Março">Março</option>
                            <option value="Abril">Abril</option>
                            <option value="Maio">Maio</option>
                            <option value="Junho">Junho</option>
                        </select>
                    </div>
                    <div class="search-bar" style="background: var(--bg-card); padding: 0.6rem 1rem; border-radius: 12px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 0.8rem;">
                        <i class="fa-solid fa-search" style="color: var(--text-muted)"></i>
                        <input type="text" id="searchInput" list="searchClientsList" placeholder="Buscar cliente..." style="background: transparent; border: none; color: white; outline: none;">
                        <datalist id="searchClientsList"></datalist>
                    </div>
                </div>
            </header>

            <div class="crm-top-metrics">
                <div class="crm-metric">
                    <h3>Total de Clientes</h3>
                    <p id="totalClients">0</p>
                </div>
                <div class="crm-metric">
                    <h3>Clientes com Pendências</h3>
                    <p id="clientsWithDebt" style="background: var(--warning); -webkit-background-clip: text; background-clip: text;">0</p>
                </div>
                <div class="crm-metric">
                    <h3>Ticket Médio Geral</h3>
                    <p id="averageTicket" style="background: var(--grad-3); -webkit-background-clip: text; background-clip: text;">R$ 0,00</p>
                </div>
            </div>

            <div class="crm-grid" id="crmGrid">
                <!-- Cartões de clientes serão injetados aqui via JS -->
            </div>
        </main>
    </div>

    <!-- Modal de Histórico -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Histórico de Compras</h2>
            <div id="historyList">
                <!-- Itens injetados via JS -->
            </div>
        </div>
    </div>

    <script src="./clientes.js"></script>
</body>
</html>
