<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces Dashboard - Vendas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-candy-cane logo-icon"></i>
                <h2>DocesWeb</h2>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="vendas.html" class="nav-item active"><i class="fa-solid fa-clipboard-list"></i> Vendas</a>
                <a href="estoque.html" class="nav-item"><i class="fa-solid fa-box-open"></i> Estoque</a>
                <a href="clientes.html" class="nav-item"><i class="fa-solid fa-users"></i> Clientes (CRM)</a>
            </nav>
            
            <div style="margin-top: auto; padding-top: 1rem;">
                <label style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Link da Planilha Google:</label>
                <input type="text" id="sheetUrlInput" placeholder="Cole o link aqui..." style="width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; font-size: 0.8rem; margin-bottom: 0.5rem; outline: none;">
                <button id="syncBtn" class="nav-item" style="background: rgba(13, 240, 163, 0.1); border: 1px solid rgba(13, 240, 163, 0.2); color: var(--success); cursor: pointer; width: 100%; text-align: left; font-size: 0.9rem; font-family: inherit;">
                    <i class="fa-solid fa-sync"></i> Sincronizar Excel
                </button>
            </div>
            <div class="user-profile">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div>
                    <h4>Administrador</h4>
                    <p>admin@doces.com</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Lançar Vendas</h1>
                    <p class="subtitle">Registre novos pedidos diretamente na sua planilha</p>
                </div>
            </header>

            <section class="metrics-grid">
                <div class="metric-card" style="grid-column: span 2; padding: 2rem; background: var(--bg-card); border-radius: 16px; max-width: 800px; margin: 0 auto;">
                    <h3 style="margin-bottom: 2rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px;">🛒 Registrar Nova Venda</h3>
                    
                    <form id="vendaForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">Nome do Cliente</label>
                                <input type="text" name="cliente" id="clienteInput" list="clientsList" required placeholder="Ex: Gabriel" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); color: white; outline: none; border-color: rgba(255,255,255,0.1);">
                                <datalist id="clientsList"></datalist>
                            </div>
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">Produto / Doce</label>
                                <input type="text" name="produto" id="produtoInput" list="productsList" required placeholder="Ex: Gelado de Abacaxi" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); color: white; outline: none; border-color: rgba(255,255,255,0.1);">
                                <datalist id="productsList"></datalist>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">Quantidade</label>
                                <input type="number" name="quantidade" required value="1" min="1" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); color: white; outline: none; border-color: rgba(255,255,255,0.1);">
                            </div>
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">Valor Total (R$)</label>
                                <input type="number" step="0.01" name="valor" required placeholder="0.00" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); color: white; outline: none; border-color: rgba(255,255,255,0.1);">
                            </div>
                            <div class="form-group">
                                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">Status do Pagamento</label>
                                <select name="status" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: #151b29; color: white; outline: none; border-color: rgba(255,255,255,0.1);">
                                    <option value="PAGO">PAGO</option>
                                    <option value="PENDENTE">PENDENTE (Fiado)</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                             <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">Data da Venda</label>
                             <input type="date" name="data" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.02); color: white; outline: none; border-color: rgba(255,255,255,0.1);">
                        </div>

                        <button type="submit" class="btn-primary" style="margin-top: 1rem; padding: 1.2rem; width: 100%; justify-content: center; font-size: 1.1rem;">
                            <i class="fa-solid fa-cloud-upload-alt"></i> Gravar na Planilha Excel
                        </button>
                        
                        <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">
                            <i class="fa-solid fa-info-circle"></i> Os dados serão salvos na aba do mês correspondente. Certifique-se de salvar o Excel antes de registrar.
                        </p>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="./vendas.js"></script>
</body>
</html>
